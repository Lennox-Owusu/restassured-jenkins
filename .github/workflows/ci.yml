name: API Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: mvn -B test

      - name: Generate Allure Report
        run: mvn -B allure:report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always() # upload even if tests fail, so you can inspect results
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

      # ---------------------------
      # Slack Notification (Webhook)
      # ---------------------------
      # OPTION A (simple): Incoming Webhook
      - name: Slack Notification (success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          payload=$(cat <<'JSON'
          {
            "attachments": [
              {
                "color": "good",
                "title": "✅ API Tests PASSED",
                "text": "*Repo:* ${GITHUB_REPO}\n*Branch:* ${BRANCH}\n*Commit:* ${COMMIT}\n*Actor:* ${GITHUB_ACTOR}\n*Run:* ${GITHUB_RUN_URL}",
                "mrkdwn_in": ["text"]
              }
            ]
          }
          JSON
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Slack Notification (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          payload=$(cat <<'JSON'
          {
            "attachments": [
              {
                "color": "danger",
                "title": "❌ API Tests FAILED",
                "text": "*Repo:* ${GITHUB_REPO}\n*Branch:* ${BRANCH}\n*Commit:* ${COMMIT}\n*Actor:* ${GITHUB_ACTOR}\n*Run:* ${GITHUB_RUN_URL}\n\n_Please download the **Allure Report** artifact for details._",
                "mrkdwn_in": ["text"]
              }
            ]
          }
          JSON
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      # ---------------------------
      # Email Notification (SMTP)
      # ---------------------------
      - name: Send Email (success)
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ✅ API Tests PASSED — ${{ github.repository }} @ ${{ github.ref_name }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          content_type: text/html
          body: |
            <h3>API Tests PASSED</h3>
            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Branch:</b> ${{ github.ref_name }}</p>
            <p><b>Commit:</b> ${{ github.sha }}</p>
            <p><b>Actor:</b> ${{ github.actor }}</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a></p>
            <p>Download the <i>Allure Report</i> from the workflow artifacts.</p>

      - name: Send Email (failure)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ❌ API Tests FAILED — ${{ github.repository }} @ ${{ github.ref_name }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          content_type: text/html
          body: |
            <h3>API Tests FAILED</h3>
            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Branch:</b> ${{ github.ref_name }}</p>
            <p><b>Commit:</b> ${{ github.sha }}</p>
            <p><b>Actor:</b> ${{ github.actor }}</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a></p>
            <p>Please download the <i>Allure Report</i> artifact for detailed failure logs and stack traces.</p>

